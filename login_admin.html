<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Auth — Eco-Tracks Nepal</title>
  
  <script src="./js/storage_manager.js"></script>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(ellipse at top left, #E3F2FD 0%, #F5F9FF 40%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
  </style>
  <script src="./js/geographic_matrix.js"></script>
  <script src="./js/emission_factors.js"></script>
  <script src="./js/utils.js"></script>
</head>
<body>
  <form class="auth-card animate-scale-in" id="admin-login-form" onsubmit="event.preventDefault();">
    <div style="font-size:3rem;margin-bottom:16px;">⚙️</div>
    <h2 data-i18n="admin_auth_title">Admin Authentication</h2>
    <p class="text-muted text-sm mb-24" data-i18n="admin_auth_desc">Enter the school password to access settings.</p>

    <div class="form-group text-left">
      <label class="form-label" data-i18n="login_username">Username</label>
      <input type="text" id="auth-user" class="form-input" placeholder="admin" required>
    </div>
    <div class="form-group text-left mb-24">
      <label class="form-label" data-i18n="login_password">Password</label>
      <input type="password" id="auth-pass" class="form-input" placeholder="admin123" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg w-full" id="btn-auth" data-i18n="login_btn_teacher">Access Dashboard 📊</button>
    
    <div class="mt-24">
      <a href="index.html" class="btn btn-ghost btn-sm" data-i18n="nav_home">🏠 Return to Hub</a>
    </div>
  </form>

  <script src="./js/i18n.js"></script>
  <script>

    I18n.init();

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('auth-user').value.trim();
      const p = document.getElementById('auth-pass').value;
      const ok = await StorageManager.authenticateAdmin(u, p);
      if (ok) {
        const config = StorageManager.getAdminConfig();
        window.location.href = config ? 'admin.html' : 'setup.html';
      } else {
        showToast('Invalid credentials.', 'error');
      }
    });
  </script>
</body>
</html>
