<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Auth — Eco-Tracks Nepal</title>
  <title>Admin Auth — Eco-Tracks Nepal</title>
  <script type="module">
    import { StorageManager } from './js/storage_manager.js';
  </script>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(ellipse at top left, #E3F2FD 0%, #F5F9FF 40%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>
<body>
  <div class="auth-card animate-scale-in">
    <div style="font-size:3rem;margin-bottom:16px;">⚙️</div>
    <h2 data-i18n="admin_auth_title">Admin Authentication</h2>
    <p class="text-muted text-sm mb-24" data-i18n="admin_auth_desc">Enter the school password to access settings.</p>

    <div class="form-group text-left">
      <label class="form-label" data-i18n="login_username">Username</label>
      <input type="text" id="auth-user" class="form-input" placeholder="admin">
    </div>
    <div class="form-group text-left mb-24">
      <label class="form-label" data-i18n="login_password">Password</label>
      <input type="password" id="auth-pass" class="form-input" placeholder="admin123">
    </div>
    <button class="btn btn-primary btn-lg" id="btn-auth" style="width:100%" data-i18n="login_btn_teacher">Access Dashboard 📊</button>
    
    <div class="mt-24">
      <a href="index.html" class="btn btn-ghost btn-sm" data-i18n="nav_home">🏠 Return to Hub</a>
    </div>
  </div>

  <script type="module">
    import { StorageManager } from './js/storage_manager.js';
    import { I18n } from './js/i18n.js';

    I18n.init();

    document.getElementById('btn-auth').addEventListener('click', () => {
      const u = document.getElementById('auth-user').value.trim();
      const p = document.getElementById('auth-pass').value;
      if (StorageManager.authenticateAdmin(u, p)) {
        const config = StorageManager.getAdminConfig();
        if (!config) {
          window.location.href = 'setup.html';
        } else {
          window.location.href = 'admin.html';
        }
      } else {
        alert('Invalid credentials.');
      }
    });
  </script>
</body>
</html>
