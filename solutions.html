<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geographic Solutions — Eco-Tracks Nepal</title>
  <script src="./js/storage_manager.js"></script>
  <script>
    if (!StorageManager.getAdminConfig()) { window.location.replace('setup.html'); }
  </script>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .eco-mission-hero { text-align: center; margin-top: 40px; margin-bottom: 30px; }
    .eco-mission-hero h1 { color: #1B5E20; font-size: 2.2rem; margin-bottom: 12px; }
    .eco-mission-hero p { color: #666; font-size: 1.05rem; max-width: 600px; margin: 0 auto; line-height: 1.5; }
    
    .eco-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
    
    .eco-card {
      background: white;
      border: 1px solid #f0f0f0;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s;
    }
    .eco-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    
    .eco-icon-wrapper {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 16px;
    }
    
    .eco-image-placeholder {
      width: 100%; height: 120px; background: #f5f5f5;
      border-radius: 12px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center;
      color: #999; font-size: 0.8rem; border: 1px dashed #ccc;
    }
    
    .eco-card h3 { font-size: 1.3rem; color: #333; margin-bottom: 8px; }
    .eco-card p.eco-quote {
      font-size: 0.9rem; font-style: italic; color: #666;
      line-height: 1.4; margin-bottom: 24px; flex-grow: 1;
    }
    
    .eco-progress-row { margin-bottom: 12px; }
    .eco-progress-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; color: #444; margin-bottom: 6px; }
    .eco-progress-track { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .eco-progress-fill { height: 100%; border-radius: 4px; }
    
    .eco-commit-btn {
      width: 100%; padding: 14px; border-radius: 24px;
      background: #1B5E20; color: white; font-weight: bold;
      border: none; cursor: pointer; margin-top: 16px;
      transition: background 0.2s; font-size: 0.95rem;
    }
    .eco-commit-btn:hover { background: #144d18; }
    .eco-commit-btn:disabled { background: #888; cursor: not-allowed; }
    
    @media (max-width: 768px) { .eco-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="./js/geographic_matrix.js"></script>
  <script src="./js/emission_factors.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/nav.js"></script>
</head>
<body>
  <script>
    renderNav({
      activePage: 'transparency.html',
      actionsHTML: '<a href="overview.html" class="btn btn-outline btn-sm" data-i18n="footer_overview">📈 Overview</a><a href="index.html" class="btn btn-ghost btn-sm" id="btn-home-nav" data-i18n="nav_home">🏠 Return to Hub</a>'
    });
  </script>

  <!-- Main -->
  <main class="page-main" id="main-content">
    <div class="container">

      <!-- Hero -->
      <div class="eco-mission-hero animate-fade-up">
        <h1>Choose Your Eco-Mission!</h1>
        <p>Pick a category and commit to a monthly challenge to reduce our school's footprint. Every action helps our world thrive!</p>
        <p class="text-sm mt-8" style="color:var(--blue);" id="geo-subtitle"></p>
      </div>

      <!-- Solutions Grid -->
      <div id="solutions-grid" class="eco-grid" aria-live="polite"></div>

    </div>
  </main>

  <script src="./js/i18n.js"></script>
  <script src="./js/solutions.js"></script>
  <script>
    (async function() {
      I18n.init();  // must run after renderNav so nav i18n keys are picked up

      const adminConfig = StorageManager.getAdminConfig();
      if (!adminConfig) return;

      const hotspot     = StorageManager.getHotspot();

      const regionColors = {
        Mountain: { bannerClass: 'geo-banner--mountain', badgeStyle: 'background:#E8EAF6;color:#3F51B5', color: '#7986CB' },
        Hilly:    { bannerClass: 'geo-banner--hilly',    badgeStyle: 'background:var(--green-100);color:var(--green-700)', color: '#56C15B' },
        Terai:    { bannerClass: 'geo-banner--terai',    badgeStyle: 'background:#FFF9C4;color:#A17900', color: '#FFB74D' },
      };

      function mapPerc(val) {
        if (val === 'Low') return '30%';
        if (val === 'Medium') return '60%';
        if (val === 'High') return '85%';
        if (val === 'Very High') return '95%';
        return '50%';
      }

      async function initSolutions() {
        try {
          const geoData = window.GEOGRAPHIC_MATRIX;
          const districtKey = adminConfig.district ? adminConfig.district.toLowerCase() : '';
          const distData = (geoData && geoData.districts && geoData.districts[districtKey]) || { region: 'Hilly', name: 'Unknown' };
          
          const region = distData.region || 'Hilly';
          document.getElementById('geo-subtitle').textContent = `📍 Targeted tactics for ${distData.name || 'Unknown'} District (${region})`;

          // Render solution cards
          const solutionPool = geoSolutionsMatrix[region] || geoSolutionsMatrix['Hilly'];
          const grid         = document.getElementById('solutions-grid');
          grid.innerHTML     = '';

          const categories = ['energy', 'commute', 'waste', 'water', 'paper'];

          categories.forEach((cat, idx) => {
            const sol = solutionPool[cat];
            if (!sol) return;

            const meta = categoryLabels[cat] || { emoji: '📊', label: cat, color: '#888', bg: '#f5f5f5' };
            const effortPct = mapPerc(sol.effort);
            const impactPct = mapPerc(sol.impact);

            const card = document.createElement('div');
            card.className = `eco-card animate-fade-up delay-${Math.min(idx+1, 5)}`;

            card.innerHTML = `
              <div class="eco-icon-wrapper" style="background:${meta.bg}; color:${meta.color};">
                ${meta.emoji}
              </div>
              
              <div class="eco-image-placeholder">
                [Upload Image: src/img/${cat}.jpg]
              </div>

              <h3>${meta.label}</h3>
              <p class="eco-quote">"${sol.action.replace('Target: ', '')}"</p>

              <div class="eco-progress-row">
                <div class="eco-progress-header">
                  <span>Impact</span>
                  <span style="color:#2E7D32">${impactPct}</span>
                </div>
                <div class="eco-progress-track">
                  <div class="eco-progress-fill" style="width:${impactPct}; background:#2E7D32;"></div>
                </div>
              </div>

              <div class="eco-progress-row">
                <div class="eco-progress-header">
                  <span>Effort</span>
                  <span style="color:#1976D2">${effortPct}</span>
                </div>
                <div class="eco-progress-track">
                  <div class="eco-progress-fill" style="width:${effortPct}; background:#1976D2;"></div>
                </div>
              </div>

              <button class="eco-commit-btn commit-btn" data-title="${sol.title}">Commit for a Month</button>
            `;

            grid.appendChild(card);
          });

          // Add commit listeners
          document.querySelectorAll('.commit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              const title = e.target.getAttribute('data-title');
              StorageManager.setActiveMission(StorageManager.getCurrentGrade(), title);
              alert("Mission Saved!");
              e.target.textContent = '✅ Committed!';
              e.target.disabled = true;
            });
          });

        } catch (err) {
          console.error(err);
        }
      }

      await initSolutions();
    })();
  </script>
</body>
</html>
