<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solutions — Eco-Tracks Nepal</title>
  <script src="./js/storage_manager.js"></script>
  <script>
    if (!StorageManager.getAdminConfig()) { window.location.replace('setup.html'); }
  </script>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2D6A2F">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .solutions-hero { text-align: center; padding: 36px 0 20px; }
    .solutions-hero h1 { color: var(--green-800); margin-bottom: 8px; }
    .solutions-hero p  { color: var(--text-muted); max-width: 600px; margin: 0 auto; }

    .category-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin: 24px 0;
      border-bottom: 2px solid var(--border); padding-bottom: 0;
    }
    .cat-tab {
      padding: 10px 18px; border-radius: 8px 8px 0 0;
      border: 1px solid var(--border); border-bottom: none;
      background: var(--bg-page); cursor: pointer; font-weight: 700;
      font-size: 0.85rem; color: var(--text-muted); transition: var(--transition);
      font-family: 'Nunito', sans-serif; position: relative; bottom: -2px;
    }
    .cat-tab.active {
      background: var(--bg-card); color: var(--green-800);
      border-color: var(--border); border-bottom-color: var(--bg-card);
    }
    .cat-tab .hotspot-pip {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #E53935; margin-left: 6px; vertical-align: middle;
    }

    .category-panel { display: none; }
    .category-panel.active { display: block; }

    .category-context {
      background: var(--bg-page); border-left: 4px solid var(--green-500);
      border-radius: 0 8px 8px 0; padding: 14px 18px; margin-bottom: 24px;
      font-size: 0.9rem; color: var(--text-body); line-height: 1.6;
    }

    .action-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 24px 28px;
      box-shadow: var(--shadow-sm); margin-bottom: 20px;
      transition: var(--transition);
    }
    .action-card:hover { box-shadow: var(--shadow-card); }
    .action-card.hotspot-card { border-left: 4px solid #E53935; }

    .action-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .action-title { font-size: 1.15rem; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
    .action-desc  { font-size: 0.9rem; color: var(--text-body); line-height: 1.6; margin-bottom: 16px; }

    .action-impact-box {
      background: var(--green-50); border: 1px solid var(--green-300);
      border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .action-impact-box__icon { font-size: 1.5rem; flex-shrink: 0; }
    .action-impact-box__val  { font-size: 1.2rem; font-weight: 900; color: var(--green-800); }
    .action-impact-box__sub  { font-size: 0.8rem; color: var(--green-700); }

    .action-meta {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .meta-chip {
      font-size: 0.78rem; font-weight: 700; padding: 3px 10px;
      border-radius: 12px; border: 1px solid;
    }
    .meta-chip--cost       { background: #E3F2FD; color: #1565C0; border-color: #90CAF9; }
    .meta-chip--difficulty { background: #F3E5F5; color: #6A1B9A; border-color: #CE93D8; }
    .meta-chip--time       { background: #E8F5E9; color: #2E7D32; border-color: #A5D6A7; }

    .steps-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 8px 14px;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px; transition: var(--transition);
      width: 100%;
    }
    .steps-toggle:hover { background: var(--bg-page); }
    .steps-toggle .arrow { transition: transform 0.2s; }
    .steps-toggle.open .arrow { transform: rotate(90deg); }

    .steps-list {
      display: none; margin-top: 12px;
      background: var(--bg-page); border-radius: var(--radius-md);
      padding: 16px 20px;
    }
    .steps-list.open { display: block; }
    .steps-list ol   { margin: 0; padding-left: 20px; }
    .steps-list li   { margin-bottom: 8px; font-size: 0.88rem; color: var(--text-body); line-height: 1.6; }

    .commit-btn-wrap { margin-top: 16px; display: flex; justify-content: flex-end; }

    @media (max-width: 640px) {
      .category-tabs { gap: 4px; }
      .cat-tab { padding: 8px 12px; font-size: 0.78rem; }
      .action-card { padding: 18px 16px; }
    }
  </style>
  <script src="./js/geographic_matrix.js"></script>
  <script src="./js/emission_factors.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/nav.js"></script>
</head>
<body>
  <script>
    renderNav({ activePage: 'solutions.html' });
  </script>

  <main class="page-main">
    <div class="container">

      <div class="solutions-hero animate-fade-up">
        <h1>🌱 Targeted Solutions</h1>
        <p id="hero-subtitle">Region-specific, data-driven actions for your school — with real CO₂ reduction numbers.</p>
      </div>

      <div id="solutions-body"></div>

    </div>
  </main>

  <script src="./js/goal_engine.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/solutions.js"></script>
  <script>
    (function () {
      renderFooter({ showOverviewLink: true });
      I18n.init();

      const adminConfig  = StorageManager.getAdminConfig();
      if (!adminConfig) return;

      const geoData  = window.GEOGRAPHIC_MATRIX?.districts || {};
      const distData = geoData[adminConfig.district] || { region: 'Hilly', name: 'Unknown' };
      const region   = distData.region || 'Hilly';

      document.getElementById('hero-subtitle').textContent =
        `📍 ${distData.name} District · ${region} Region — actions tailored to your local context.`;

      // Get current CO₂ data per category for the active grade
      const grade = StorageManager.getCurrentGrade();
      const latestEntry = StorageManager.getLatestForGrade(grade);
      const catCO2 = {};
      if (latestEntry?.data) {
        Object.entries(latestEntry.data).forEach(([cat, d]) => { catCO2[cat] = d.co2 || 0; });
      }

      const urlCat  = new URLSearchParams(location.search).get('cat');
      const hotspot = urlCat || StorageManager.getHotspot() || 'energy';

      const solutionPool = geoSolutionsMatrix[region] || geoSolutionsMatrix['Hilly'];
      const CATS = ['energy', 'commute', 'waste', 'water', 'paper']
        .sort((a, b) => (a === hotspot ? -1 : b === hotspot ? 1 : 0));

      // Build tab bar
      const tabBar = CATS.map(cat => {
        const meta = categoryLabels[cat];
        const isHot = cat === hotspot;
        return `<button class="cat-tab${cat === CATS[0] ? ' active' : ''}" data-cat="${cat}">
          ${meta.emoji} ${meta.label}${isHot ? '<span class="hotspot-pip" title="Your hotspot"></span>' : ''}
        </button>`;
      }).join('');

      // Build all panels
      const panels = CATS.map((cat, panelIdx) => {
        const sol  = solutionPool[cat];
        const meta = categoryLabels[cat];
        const isHot = cat === hotspot;
        const currentCO2 = catCO2[cat] || 0;

        if (!sol) return '';

        const actionsHTML = (sol.actions || []).map((action, i) => {
          const savedKg = currentCO2 > 0
            ? (currentCO2 * action.reduction_pct / 100).toFixed(1)
            : action.monthly_kg_typical.toFixed(1);
          const hasRealData = currentCO2 > 0;

          const stepsHTML = (action.steps || []).map(s => `<li>${s}</li>`).join('');

          return `
            <div class="action-card${isHot && i === 0 ? ' hotspot-card' : ''} animate-fade-up delay-${Math.min(i+1,4)}">
              <div class="action-header">
                <div>
                  ${isHot && i === 0 ? '<span style="background:#FFEBEE;color:#C62828;font-size:0.75rem;font-weight:800;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:6px;">⚠️ TOP PRIORITY</span><br>' : ''}
                  <div class="action-title">${action.title}</div>
                </div>
              </div>
              <div class="action-desc">${action.description}</div>

              <div class="action-impact-box">
                <div class="action-impact-box__icon">🌍</div>
                <div>
                  <div class="action-impact-box__val">
                    Save ~${savedKg} kg CO₂e/month
                    ${hasRealData ? '' : ' <span style="font-size:0.72rem;color:var(--text-caption);">(estimate)</span>'}
                  </div>
                  <div class="action-impact-box__sub">
                    ${action.reduction_pct}% reduction in ${meta.label.toLowerCase()} emissions
                    ${hasRealData ? ` · based on your ${currentCO2.toFixed(1)} kg this session` : '· log a session for your exact number'}
                  </div>
                </div>
              </div>

              <div class="action-meta">
                <span class="meta-chip meta-chip--cost">💰 ${action.cost}</span>
                <span class="meta-chip meta-chip--difficulty">⚙️ ${action.difficulty}</span>
                <span class="meta-chip meta-chip--time">⏱ ${action.time_to_impact}</span>
              </div>

              <button class="steps-toggle" data-id="steps-${cat}-${i}">
                <span class="arrow">▶</span>
                📋 Step-by-step implementation (${action.steps?.length || 0} steps)
              </button>
              <div class="steps-list" id="steps-${cat}-${i}">
                <ol>${stepsHTML}</ol>
              </div>

              <div class="commit-btn-wrap">
                <button class="btn btn-primary btn-sm commit-btn" data-cat="${cat}" data-title="${action.title}" data-badge="${action.badge || ''}">
                  🎯 Commit to This Action
                </button>
              </div>
            </div>`;
        }).join('');

        return `
          <div class="category-panel${panelIdx === 0 ? ' active' : ''}" id="panel-${cat}">
            <div class="category-context">${sol.context}</div>
            ${actionsHTML}
          </div>`;
      }).join('');

      document.getElementById('solutions-body').innerHTML = `
        <div class="category-tabs" id="cat-tabs">${tabBar}</div>
        <div id="panels-wrap">${panels}</div>`;

      // Tab switching
      document.getElementById('cat-tabs').addEventListener('click', e => {
        const btn = e.target.closest('.cat-tab');
        if (!btn) return;
        const cat = btn.dataset.cat;
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.category-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + cat)?.classList.add('active');
      });

      // Step toggle
      document.getElementById('panels-wrap').addEventListener('click', e => {
        const toggle = e.target.closest('.steps-toggle');
        if (!toggle) return;
        const id  = toggle.dataset.id;
        const box = document.getElementById(id);
        toggle.classList.toggle('open');
        box?.classList.toggle('open');
      });

      // Commit
      document.getElementById('panels-wrap').addEventListener('click', e => {
        const btn = e.target.closest('.commit-btn');
        if (!btn) return;
        const grade = StorageManager.getCurrentGrade();
        const title = btn.dataset.title;
        const cat   = btn.dataset.cat;
        StorageManager.setActiveMission(grade, title);
        if (typeof GoalEngine !== 'undefined') {
          GoalEngine.suggestGoalsFromSubmission(grade, { [cat]: { co2: catCO2[cat] || 10 } });
        }
        showToast('🎯 Action committed! Check Goals & Badges for progress.', 'success');
        btn.textContent = '✅ Committed!';
        btn.disabled    = true;
      });

      // Footer
      document.getElementById('btn-sync-footer')?.addEventListener('click', async () => {
        const result = await StorageManager.flushSyncQueue();
        showToast(result.synced > 0 ? `✅ ${result.synced} synced!` : '✅ Nothing to sync.', 'success');
      });
      document.getElementById('btn-reset-data')?.addEventListener('click', () => {
        if (confirm('Reset ALL app data?')) { localStorage.clear(); sessionStorage.clear(); location.href = 'setup.html'; }
      });

      // Scroll to hotspot
      setTimeout(() => {
        const activePanel = document.querySelector('.category-panel.active');
        if (activePanel) activePanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300);
    })();
  </script>
</body>
</html>
