<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login — Eco-Tracks Nepal</title>
  <script src="./js/storage_manager.js"></script>
  <script>
    if (!StorageManager.getAdminConfig()) { window.location.replace('setup.html'); }
  </script>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(ellipse at top left, #F9FBE7 0%, #F1F8E9 40%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
  <script src="./js/geographic_matrix.js"></script>
  <script src="./js/emission_factors.js"></script>
</head>
<body>
  <form class="auth-card animate-scale-in" id="student-login-form" onsubmit="event.preventDefault();">
    <div style="font-size:3rem;margin-bottom:16px;">😊</div>
    <h2 data-i18n="login_student_title">Student Login</h2>
    <p class="text-muted text-sm mb-24" data-i18n="login_student_desc">Ready for your eco-missions?</p>

    <div class="grid-2 text-left mb-24">
      <div class="form-group">
        <label class="form-label" data-i18n="login_select_class">Class</label>
        <select class="form-select" id="grade-selector">
          <option value="Grade 1">Grade 1</option>
          <option value="Grade 2">Grade 2</option>
          <option value="Grade 3">Grade 3</option>
          <option value="Grade 4">Grade 4</option>
          <option value="Grade 5">Grade 5</option>
          <option value="Grade 6">Grade 6</option>
          <option value="Grade 7">Grade 7</option>
          <option value="Grade 8">Grade 8</option>
          <option value="Grade 9">Grade 9</option>
          <option value="Grade 10">Grade 10</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login_select_section">Section</label>
        <input type="text" class="form-input" id="section-selector" placeholder="A" required>
      </div>
    </div>
    
    <button type="submit" class="btn btn-gold btn-lg" id="btn-login" style="width:100%" data-i18n="login_btn_student">Go Exploring! ✨</button>
    
    <div class="mt-24" style="display:flex;flex-direction:column;gap:12px;align-items:center;">
      <a href="overview.html" class="btn btn-outline btn-sm" data-i18n="footer_overview" style="width:100%">📈 Overview</a>
      <a href="index.html" class="btn btn-ghost btn-sm" data-i18n="nav_home">🏠 Return to Hub</a>
    </div>
  </form>

  <script src="./js/i18n.js"></script>
  <script>

    I18n.init();

    document.getElementById('student-login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const adminConfig = StorageManager.getAdminConfig();
      if (!adminConfig || adminConfig.electricity === undefined) {
        alert(I18n.currentLang === 'ne' 
          ? "पख्नुहोस्! तपाईंले सुरु गर्नु अघि प्रशासकले विद्यालय विवरणहरू प्रविष्ट गर्नुपर्छ।"
          : "Wait! The Admin must input the school details before you can start exploring!");
        return;
      }
      
      const g = document.getElementById('grade-selector').value;
      const s = document.getElementById('section-selector').value.trim() || 'A';
      StorageManager.setCurrentGrade(g, s);
      window.location.href = 'student.html';
    });
  </script>
</body>
</html>
