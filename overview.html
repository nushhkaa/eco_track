<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Overview — Eco-Tracks Nepal</title>
  <script src="./js/storage_manager.js"></script>
  <script>
    if (!StorageManager.getAdminConfig()) { window.location.replace('setup.html'); }
  </script>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2D6A2F">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .overview-hero h1 { color: var(--green-800); margin-bottom: 8px; }
    .overview-hero p  { color: var(--text-muted); }

    .grade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }

    .grade-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }
    .grade-card__title { font-size: 1.1rem; font-weight: 800; color: var(--green-700); margin-bottom: 12px; }
    .grade-card__stat { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px; }
    .grade-card__stat span.val { font-weight: 700; color: var(--text-primary); }
    
    .total-box {
      background: linear-gradient(135deg, var(--green-500), var(--green-700));
      color: #fff;
      padding: 32px;
      border-radius: var(--radius-xl);
      text-align: center;
      margin: 32px 0;
      box-shadow: var(--shadow-md);
    }
    .total-box h2 { color: #fff; font-size: 1.2rem; margin-bottom: 8px; }
    .total-box .huge-val { font-size: 3rem; font-weight: 900; }
  </style>
  <script src="./js/geographic_matrix.js"></script>
  <script src="./js/emission_factors.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/nav.js"></script>
</head>
<body>
  <script>
    renderNav({
      actionsHTML: '<a href="overview.html" class="btn btn-outline btn-sm" data-i18n="footer_overview">📈 Overview</a><a href="index.html" class="btn btn-ghost btn-sm" id="nav-home-btn" data-i18n="nav_home">🏠 Home</a>'
    });
  </script>

  <!-- Main -->
  <main class="page-main" id="main-content">
    <div class="container">

      <div class="overview-hero animate-fade-up">
        <h1 data-i18n="footer_overview">School-wide Emission Overview</h1>
        <p>Detailed view of all records from Grades 1 to 10.</p>
      </div>

      <div class="total-box animate-fade-up delay-1">
        <h2>Total Tracked School Emissions</h2>
        <div class="huge-val" id="total-emissions">0 kg CO₂e</div>
        <p style="opacity:0.8;margin-top:8px;" id="total-sessions">0 sessions logged across all grades</p>
        <a href="history.html" class="btn" style="background:#fff; color:var(--green-800); font-weight:800; margin-top:20px; display:inline-block; padding:10px 24px; border-radius:var(--radius-pill); text-decoration:none;">📅 View Past Analytics</a>
      </div>

      <div class="grade-grid" id="grade-grid" aria-live="polite">
        <!-- Injected by JS -->
      </div>

    </div>
  </main>

  <script src="./js/goal_engine.js"></script>
  <script src="./js/calculator_engine.js"></script>
  <script src="./js/i18n.js"></script>
  <script>
    renderFooter();
    I18n.init();

    const history = StorageManager.getHistory();
    const grid    = document.getElementById('grade-grid');

    let totalCO2 = 0;
    // Build grade stats from actual history (all grade+section combos)
    const gradeStats = {};

    history.forEach(log => {
      totalCO2 += log.totalCO2;
      if (!gradeStats[log.grade]) gradeStats[log.grade] = { sessions: 0, total: 0, latest: null };
      gradeStats[log.grade].sessions += 1;
      gradeStats[log.grade].total    += log.totalCO2;
      gradeStats[log.grade].latest   = log.timestamp;
    });

    document.getElementById('total-emissions').textContent = `${totalCO2.toFixed(1)} kg CO₂e`;
    document.getElementById('total-sessions').textContent  = `${history.length} sessions logged across all classes`;

    const engine = new CalculatorEngine();
    engine.init();

    if (Object.keys(gradeStats).length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">No student data yet. Start logging from the Missions page!</div>';
    } else {
      Object.entries(gradeStats)
        .sort((a,b) => b[1].total - a[1].total)
        .forEach(([grade, stats], idx) => {
          const badges   = StorageManager.getBadges(grade);
          const gradeInfo = engine.gradeFootprint(stats.total / Math.max(stats.sessions, 1));
          const badgeRow = badges.length > 0
            ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">${badges.map(b=>`<span title="${b.title}" style="font-size:1.2rem;">${b.emoji}</span>`).join('')}</div>`
            : '';

          const card = document.createElement('div');
          card.className = `grade-card animate-fade-up delay-${Math.min((idx%5)+1, 5)}`;
          card.style.borderTop = `3px solid ${gradeInfo.color}`;
          card.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
              <div class="grade-card__title" style="margin:0;">${grade}</div>
              <span class="badge" style="background:${gradeInfo.color};color:#fff;padding:4px 10px;border-radius:20px;font-size:0.78rem;font-weight:800;">${gradeInfo.grade}</span>
            </div>
            <div class="grade-card__stat"><span class="text-muted">Total Emissions:</span> <span class="val">${stats.total.toFixed(1)} kg CO₂e</span></div>
            <div class="grade-card__stat"><span class="text-muted">Sessions Logged:</span> <span class="val">${stats.sessions}</span></div>
            <div class="grade-card__stat"><span class="text-muted">Last Update:</span> <span class="val">${stats.latest || 'Never'}</span></div>
            ${badgeRow}
          `;
          grid.appendChild(card);
        });
    }

    document.getElementById('btn-sync-footer').addEventListener('click', async () => {
      const result = await StorageManager.syncWithServer();
      showToast(result.message, result.success ? 'success' : 'error');
    });
  </script>
</body>
</html>
