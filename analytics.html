<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Eco-Report Card — View your classroom's carbon footprint breakdown and achievements with Eco-Tracks Nepal.">
  <title>Analytics Dashboard — Eco-Tracks Nepal</title>
  <script src="./js/storage_manager.js"></script>
  <script>
    if (!StorageManager.getAdminConfig()) { window.location.replace('setup.html'); }
  </script>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2D6A2F">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .report-hero h1 { color: var(--green-800); margin-bottom: 8px; }
    .report-hero p  { color: var(--text-muted); }

    .report-top-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      margin: 32px 0;
      align-items: start;
    }

    /* Hotspot alert card */
    .hotspot-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px;
      display: flex;
      align-items: flex-start;
      gap: 24px;
      box-shadow: var(--shadow-card);
    }
    .hotspot-card__emoji {
      font-size: 4.5rem;
      flex-shrink: 0;
    }
    .hotspot-card__body { flex: 1; }
    .hotspot-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #FFF0F0;
      color: #C62828;
      border: 1px solid rgba(229,115,115,0.3);
      border-radius: var(--radius-pill);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 12px;
      margin-bottom: 12px;
    }
    .hotspot-card__body h3 {
      font-size: 1.35rem;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .hotspot-card__body p { font-size: 0.9rem; color: var(--text-body); line-height: 1.6; margin-bottom: 18px; }
    .hotspot-category { color: var(--red); font-weight: 800; }

    /* Quick summary box */
    .summary-stat {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .summary-stat__icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .summary-stat__icon--energy { background: #E3F0FF; }
    .summary-stat__icon--trees  { background: var(--green-100); }
    .summary-stat__label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); }
    .summary-stat__value { font-size: 1.5rem; font-weight: 900; color: var(--text-primary); line-height: 1.1; }

    .see-math-btn {
      width: 100%;
      background: rgba(91,141,217,0.1);
      border: 1px solid rgba(91,141,217,0.25);
      color: var(--blue);
      border-radius: var(--radius-md);
      padding: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      text-decoration: none;
    }
    .see-math-btn:hover { background: var(--blue-light); }

    .quote-box {
      background: var(--bg-page);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      font-size: 0.875rem;
      font-style: italic;
      color: var(--text-muted);
      text-align: center;
      margin-top: 14px;
    }

    /* Category breakdown */
    .breakdown-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-card);
      margin-bottom: 24px;
    }
    .breakdown-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .breakdown-header h2 { font-size: 1.4rem; }
    .breakdown-header p  { color: var(--text-muted); font-size: 0.875rem; margin-top: 4px; }

    .bar-chart-wrap {
      margin: 32px 0 12px;
    }

    .bar-col-inner {
      width: 100%;
      max-width: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bar-comparison {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      width: 100%;
      max-width: 80px;
    }

    .bar-current, .bar-past {
      flex: 1;
      border-radius: 8px 8px 3px 3px;
      transition: height 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-height: 4px;
    }

    .bar-past { opacity: 0.4; }

    .bar-category-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    /* Legend */
    .chart-legend {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Grade badge big */
    .grade-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    /* No data state */
    .no-data-state {
      text-align: center;
      padding: 60px 24px;
    }
    .no-data-state .emoji { font-size: 4rem; margin-bottom: 16px; }

    @media (max-width: 768px) {
      .report-top-grid { grid-template-columns: 1fr; }
      .hotspot-card { flex-direction: column; }
    }
  </style>
  <script src="./js/geographic_matrix.js"></script>
  <script src="./js/emission_factors.js"></script>
  <script src="./js/solutions.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/nav.js"></script>
</head>
<body>
  <script>
    renderNav({
      actionsHTML: '<a href="overview.html" class="btn btn-outline btn-sm" data-i18n="footer_overview">📈 Overview</a><div class="badge badge-green" id="grade-badge-nav" aria-live="polite">—</div>'
    });
  </script>

  <!-- ── Main ── -->
  <main class="page-main" id="main-content">
    <div class="container">

      <!-- Hero -->
      <div class="report-hero animate-fade-up">
        <h1 id="report-heading">This Month's Eco-Report Card!</h1>
        <p>Check your school's progress and help our planet smile!</p>
      </div>

      <!-- Main content area -->
      <div id="analytics-content">
        <!-- Injected by JS -->
      </div>

      <!-- No-data fallback -->
      <div id="no-data-state" class="no-data-state" style="display:none">
        <div class="emoji">📊</div>
        <h2>No Data Yet</h2>
        <p class="text-muted mt-8">Please complete the student tracking form first to generate your report card.</p>
        <div class="flex justify-center gap-12 mt-24">
          <a href="class_select.html" class="btn btn-gold" id="btn-go-login">🎒 Go to Student Portal</a>
          <a href="index.html" class="btn btn-outline" id="btn-go-home-nodata">🏠 Home</a>
        </div>
      </div>

    </div>
  </main>

  <script src="./js/i18n.js"></script>
  <script src="./js/calculator_engine.js"></script>
  <script src="./js/goal_engine.js"></script>
  <script>
    (function() {
      renderFooter({ showRefresh: true });
      I18n.init();

      const engine = new CalculatorEngine();
      engine.init();

      const grade = StorageManager.getCurrentGrade();
      document.getElementById('grade-badge-nav').textContent = grade;

      const currentDataObj = StorageManager.getLatestForGrade(grade);
      const pastDataObj    = StorageManager.getPreviousForGrade(grade);

      // Weekly scale: 5 school days / 22 school days per month ≈ 0.227
      const WEEKLY_SCALE = 5 / APP_CONSTANTS.SCHOOL_DAYS_MONTH;
      let activeScale = 1.0;

      if (!currentDataObj) {
        document.getElementById('no-data-state').style.display = 'block';
      } else {
        renderReport(currentDataObj, pastDataObj);
      }

      function renderReport(current, past) {
        // Apply active scale (1.0 = monthly, WEEKLY_SCALE ≈ 0.227 = weekly)
        const data     = Object.fromEntries(
          Object.entries(current.data).map(([k, v]) => [k, { ...v, co2: v.co2 * activeScale, value: v.value * activeScale }])
        );
        const prevData = past
          ? Object.fromEntries(Object.entries(past.data).map(([k, v]) => [k, { ...v, co2: v.co2 * activeScale }]))
          : null;

        // Find hotspot
        let maxCat = '', maxVal = -1;
        Object.entries(data).forEach(([cat, d]) => {
          if (d.co2 > maxVal) { maxVal = d.co2; maxCat = cat; }
        });
        StorageManager.setHotspot(maxCat);

        const totalCO2     = Object.values(data).reduce((s, d) => s + d.co2, 0);
        const prevTotalCO2 = prevData ? Object.values(prevData).reduce((s, d) => s + d.co2, 0) : 0;
        // Grade and trees always use full monthly CO2 regardless of active tab scale
        const rawTotalCO2 = current.totalCO2 || Object.values(current.data).reduce((s, d) => s + d.co2, 0);
        const trees     = engine.toTreesEquivalent(rawTotalCO2);
        const gradeInfo = engine.gradeFootprint(rawTotalCO2);

        // categoryLabels is the canonical source from solutions.js
        const catMeta = categoryLabels;

        const maxBarCO2 = Math.max(...Object.values(data).map(d => d.co2), 1);
        const maxPrevCO2 = prevData ? Math.max(...Object.values(prevData).map(d=>d.co2),1) : 1;
        const globalMax = Math.max(maxBarCO2, maxPrevCO2, 1);

        const hotspotCatLabel = catMeta[maxCat]?.label || maxCat;
        const hotspotEmoji    = catMeta[maxCat]?.emoji || '⚠️';

        const improvement = prevTotalCO2 > 0
          ? (((prevTotalCO2 - totalCO2) / prevTotalCO2) * 100).toFixed(1)
          : null;

        // ── Pain Points section ──────────────────────────────────────────────
        const TIPS = {
          energy:  'Switch canteen to briquettes/biogas; assign a monitor to turn off lights & heating.',
          commute: 'Encourage walking/cycling groups; reduce private car and motorbike pickups.',
          waste:   'Add segregation bins; start composting wet waste in the school garden.',
          water:   'Fix leaking taps; set up grey water reuse for school plants.',
          paper:   'Reuse old notebooks as scratch paper; redistribute books to junior classes.'
        };
        const sortedCats = Object.entries(data)
          .filter(([,d]) => d.co2 > 0)
          .sort((a,b) => b[1].co2 - a[1].co2)
          .slice(0,3);
        const rankEmoji = ['🥇','🥈','🥉'];

        const latestRaw = current.data || {};
        const habitItems = [];
        if (latestRaw.energy?.hasHeatingCooling && (latestRaw.energy?.heatingHoursPerDay||0) >= 4)
          habitItems.push('❄️ Heating/cooling runs ' + (latestRaw.energy.heatingHoursPerDay||0) + 'h/day — assign a switch-off monitor to earn the Energy Saver badge.');
        if (latestRaw.water?.greyWaterUse === false)
          habitItems.push('♻️ No grey water reuse — collect handwashing water for the school garden to earn the Water Warrior badge.');
        if (latestRaw.waste?.hasSegregationBins === false)
          habitItems.push('🗂️ No segregation bins — add dry/wet/hazardous bins to earn the Waste Champion badge.');
        if ((latestRaw.water?.leakingTaps||0) > 0)
          habitItems.push('🔧 ' + latestRaw.water.leakingTaps + ' leaking tap(s) reported — get them fixed to earn the Leak Fixer badge.');

        const painPointsHTML = sortedCats.length === 0 ? '' : `
          <div class="animate-fade-up delay-3 mt-24" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px 32px;box-shadow:var(--shadow-card);">
            <h3 style="margin-bottom:6px;">🔍 Top Pain Points &amp; Action Plan</h3>
            <p class="text-sm text-muted mb-20">Your biggest emission sources — and what to do about each.</p>
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${sortedCats.map(([cat,d],i) => {
                const meta = catMeta[cat] || {emoji:'📊',label:cat,color:'#888'};
                const pct  = totalCO2 > 0 ? ((d.co2/totalCO2)*100).toFixed(1) : '0';
                return `<div style="display:flex;align-items:flex-start;gap:14px;padding:14px;background:var(--bg-page);border-radius:10px;border-left:3px solid ${meta.color};">
                  <span style="font-size:1.4rem;flex-shrink:0;">${rankEmoji[i]}</span>
                  <div style="flex:1;">
                    <div style="font-weight:800;color:${meta.color};margin-bottom:2px;">${meta.emoji} ${meta.label} — ${d.co2.toFixed(1)} kg (${pct}%)</div>
                    <div style="font-size:0.85rem;color:var(--text-muted);">${TIPS[cat]||'See geographic solutions for targeted actions.'}</div>
                  </div>
                  <a href="solutions.html?cat=${cat}" class="btn btn-outline btn-sm" style="white-space:nowrap;flex-shrink:0;font-size:0.75rem;">Fix →</a>
                </div>`;
              }).join('')}
            </div>
            ${habitItems.length === 0 ? '' : `
              <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
                <div style="font-weight:700;font-size:0.9rem;margin-bottom:10px;color:var(--green-800);">🎯 Quick Wins — Earn Badges</div>
                ${habitItems.map(s => `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#F1F8E9;border-radius:8px;margin-bottom:8px;font-size:0.85rem;color:#2E7D32;">${s}</div>`).join('')}
              </div>`}
          </div>`;

        const html = `
          <div class="report-top-grid animate-fade-up">

            <!-- Hotspot alert -->
            <div class="hotspot-card">
              <div class="hotspot-card__emoji" aria-hidden="true">
                ${maxVal > 0 ? '😰' : '🌟'}
              </div>
              <div class="hotspot-card__body">
                ${maxVal > 0 ? `
                  <div class="hotspot-badge">⚠️ Attention Required</div>
                  <h3>Emission Pain Point Found!</h3>
                  <p>Oh no! Our biggest emission pain point this ${current.timestamp ? 'session' : 'month'} is
                    <span class="hotspot-category">${hotspotCatLabel}</span>${hotspotCatLabel === 'Waste' ? '' : '!'} Let's work together to change it!
                  </p>
                  <a href="solutions.html" class="btn btn-primary" id="btn-help-fix">Help Fix This →</a>
                ` : `
                  <div class="hotspot-badge" style="background:var(--green-100);color:var(--green-700);border-color:var(--green-300);">🌟 Excellent!</div>
                  <h3>Zero Carbon Session!</h3>
                  <p>Amazing! Your class recorded no emissions this session. Keep up the incredible eco-work!</p>
                  <a href="solutions.html" class="btn btn-primary">🌱 View Solutions</a>
                `}
              </div>
            </div>

            <!-- Quick Summary -->
            <div class="summary-box animate-fade-up delay-1">
              <div class="summary-box__title">Quick Summary</div>

              <div class="summary-stat">
                <div class="summary-stat__icon summary-stat__icon--energy" aria-hidden="true">⚡</div>
                <div>
                  <div class="summary-stat__label">Total CO₂e — ${activeScale < 1 ? 'This Week' : 'This Month'}</div>
                  <div class="summary-stat__value">${totalCO2.toFixed(1)} kg</div>
                </div>
              </div>

              <div class="summary-stat">
                <div class="summary-stat__icon summary-stat__icon--trees" aria-hidden="true">🌳</div>
                <div>
                  <div class="summary-stat__label">Trees Equivalent</div>
                  <div class="summary-stat__value">${trees > 0 ? trees + ' Trees' : '< 1 Tree'}</div>
                </div>
              </div>

              ${improvement !== null ? `
                <div class="summary-stat">
                  <div class="summary-stat__icon" style="background:#FFF0F0" aria-hidden="true">${parseFloat(improvement) >= 0 ? '📉' : '📈'}</div>
                  <div>
                    <div class="summary-stat__label">vs. Last Session</div>
                    <div class="summary-stat__value" style="color:${parseFloat(improvement) >= 0 ? 'var(--green-600)' : 'var(--red)'}">
                      ${parseFloat(improvement) >= 0 ? '↓' : '↑'} ${Math.abs(parseFloat(improvement))}%
                    </div>
                  </div>
                </div>
              ` : ''}

              <a href="transparency.html" class="see-math-btn mt-12" id="btn-see-math">
                📐 See the Math ↗
              </a>

              <div class="quote-box">"Small acts, big impact!"</div>
            </div>
          </div>

          <!-- Category Breakdown -->
          <div class="breakdown-section animate-fade-up delay-2">
            <div class="breakdown-header">
              <div>
                <h2>Category Breakdown</h2>
                <p>See where we are doing great and where we can improve.</p>
              </div>
              <div class="flex items-center gap-12">
                <div class="grade-circle" style="background:${gradeInfo.color}" title="${gradeInfo.label}" aria-label="Grade: ${gradeInfo.grade}">
                  ${gradeInfo.grade}
                </div>
                <div class="tab-group" role="group" aria-label="View toggle">
                  <button class="tab-btn ${activeScale < 1 ? 'active' : ''}" id="tab-weekly">Weekly</button>
                  <button class="tab-btn ${activeScale === 1.0 ? 'active' : ''}" id="tab-monthly">Monthly</button>
                </div>
              </div>
            </div>

            <!-- Legend -->
            <div class="chart-legend">
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--green-500)"></div>
                Current Quarter
              </div>
              ${prevData ? `
                <div class="legend-item">
                  <div class="legend-dot" style="background:var(--text-caption)"></div>
                  Previous Log (Overlay)
                </div>
              ` : ''}
            </div>

            <!-- Bar Chart -->
            <div class="bar-chart bar-chart-wrap" id="bar-chart-container" role="img" aria-label="Category CO2 breakdown bar chart">
              ${Object.keys(data).map((cat, i) => {
                const co2     = data[cat].co2;
                const prevCO2 = prevData ? (prevData[cat]?.co2 || 0) : 0;
                const barHeightPct = ((co2 / globalMax) * 100).toFixed(1);
                const barHeightPrevPct = ((prevCO2 / globalMax) * 100).toFixed(1);
                const pct = totalCO2 > 0 ? ((co2 / totalCO2) * 100).toFixed(1) : "0.0";
                const prevPct = prevTotalCO2 > 0 ? ((prevCO2 / prevTotalCO2) * 100).toFixed(1) : "0.0";
                const meta    = catMeta[cat] || { emoji: '📊', label: cat, color: '#888' };
                const isHot   = cat === maxCat && maxVal > 0;

                return `
                  <div class="bar-col" data-co2="${co2}" data-cat="${cat}" style="animation-delay:${i*0.1}s">
                    <span class="bar-pct ${isHot ? 'text-red font-bold' : ''}" aria-label="${pct}%">${pct}%</span>
                    <div class="bar-comparison" style="height:160px;align-items:flex-end;">
                      <div class="bar-current bar-fill bar-fill--${cat}"
                           style="height:${barHeightPct}%;background:${isHot ? 'var(--red)' : meta.color}"
                           title="${meta.label}: ${co2.toFixed(2)} kg CO₂e (${pct}%)">
                      </div>
                      ${prevData ? `
                        <div class="bar-past bar-fill"
                             style="height:${barHeightPrevPct}%;background:${meta.color}"
                             title="Previous: ${prevCO2.toFixed(2)} kg CO₂e (${prevPct}%)">
                        </div>
                      ` : ''}
                    </div>
                    <div class="bar-category-label">
                      <span aria-hidden="true">${meta.emoji}</span>
                      <span>${meta.label}</span>
                      <a href="solutions.html?cat=${cat}" style="font-size:0.7rem; color:var(--blue); text-decoration:underline; margin-top:4px;">💡 Fix</a>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          <!-- Admin Baselines -->
          <div class="animate-fade-up delay-2 mt-24" style="background:#E3F2FD; border:1px solid #90CAF9; border-radius:12px; padding:16px;">
            <h4 style="margin-bottom:8px; font-size:0.95rem; color:#1565C0;">🏢 School-Wide Baselines (From Admin)</h4>
            <div style="display:flex; gap:24px; font-size:0.85rem; color:#0D47A1;">
              <div><strong>Municipal Waste:</strong> ${StorageManager.getAdminConfig()?.muniWaste || 'None'}</div>
              <div><strong>Admin Paper Recycled:</strong> ${StorageManager.getAdminConfig()?.adminPaperRecycled || 0} kg</div>
            </div>
          </div>

          <!-- Achievement Cards -->
          <div class="achievement-row animate-fade-up delay-3">
            <div class="achievement-card" id="ach-best-grade">
              <div class="achievement-card__icon">🏆</div>
              <div class="achievement-card__title">Performance Grade</div>
              <div class="achievement-card__value">${gradeInfo.grade} — ${gradeInfo.label}</div>
            </div>
            <div class="achievement-card" id="ach-top-improver">
              <div class="achievement-card__icon">📈</div>
              <div class="achievement-card__title">Total Sessions Logged</div>
              <div class="achievement-card__value">${StorageManager.getHistory().filter(h=>h.grade===grade).length} Session(s)</div>
            </div>
            <div class="achievement-card" id="ach-eco-warrior">
              <div class="achievement-card__icon">🛡️</div>
              <div class="achievement-card__title">Eco-Warrior Status</div>
              <div class="achievement-card__value" style="color:var(--green-500);">${grade}</div>
            </div>
          </div>

          <!-- Grading Scale Legend -->
          <div class="animate-fade-up delay-3 mt-24 p-16" style="background:var(--bg-card); border-radius:12px; border:1px solid #eee;">
            <h4 style="margin-bottom:12px; font-size:0.95rem; color:var(--text-primary);">📊 Grade Scale Reference (kg CO₂e)</h4>
            <div id="grade-scale-legend" style="display:flex; flex-wrap:wrap; gap:12px; font-size:0.8rem; color:var(--text-muted);"></div>
          </div>

          <!-- Pain Points & Action Plan -->
          ${painPointsHTML}

          <!-- Badges earned this session -->
          <div id="badges-earned-section" class="animate-fade-up delay-3 mt-24" style="display:none;background:linear-gradient(135deg,#FFFDE7,#FFF9C4);border:1px solid #F9A825;border-radius:12px;padding:20px 24px;">
            <h4 style="color:#7A5C00;margin-bottom:12px;">🏅 Badges Earned This Session!</h4>
            <div id="badges-earned-list" style="display:flex;flex-wrap:wrap;gap:12px;"></div>
          </div>

          <!-- Goal suggestions banner -->
          <div id="goals-suggestion-banner" class="animate-fade-up delay-3 mt-16" style="display:none;background:var(--green-50);border:1px solid var(--green-300);border-radius:12px;padding:16px 20px;align-items:center;justify-content:space-between;gap:16px;">
            <div>
              <div style="font-weight:700;color:var(--green-800)">🎯 New goals have been suggested for your class!</div>
              <div style="font-size:0.85rem;color:var(--text-muted);margin-top:4px;">Based on your submission, we found improvement opportunities.</div>
            </div>
            <a href="goals.html" class="btn btn-primary btn-sm" style="white-space:nowrap;">View Goals →</a>
          </div>

          <!-- CTA -->
          <div class="flex justify-center gap-16 mt-32 animate-fade-up delay-4">
            <a href="solutions.html" class="btn btn-primary btn-lg" id="btn-proceed-solutions">🌱 View Geographic Solutions</a>
            <a href="goals.html" class="btn btn-gold" id="btn-view-goals">🎯 Goals &amp; Badges</a>
            <a href="student.html" class="btn btn-outline" id="btn-log-again">📝 Log Another Session</a>
          </div>
        `;

        document.getElementById('analytics-content').innerHTML = html;

        document.getElementById('grade-scale-legend').innerHTML =
          CalculatorEngine.GRADE_THRESHOLDS.map(t =>
            `<div style="display:flex;align-items:center;gap:6px;"><span class="badge" style="background:${t.color};color:white">${t.grade}</span> ${t.rangeLabel}</div>`
          ).join('');

        // Tab toggle — functional: re-render report at new scale
        document.getElementById('tab-weekly')?.addEventListener('click', () => {
          if (activeScale === WEEKLY_SCALE) return;
          activeScale = WEEKLY_SCALE;
          renderReport(currentDataObj, pastDataObj);
        });
        document.getElementById('tab-monthly')?.addEventListener('click', () => {
          if (activeScale === 1.0) return;
          activeScale = 1.0;
          renderReport(currentDataObj, pastDataObj);
        });
      }

      // Show new badges earned this session
      const newBadges = JSON.parse(sessionStorage.getItem('ecotracks_new_badges') || '[]');
      if (newBadges.length > 0) {
        sessionStorage.removeItem('ecotracks_new_badges');
        const section = document.getElementById('badges-earned-section');
        if (section) {
          section.style.display = 'block';
          document.getElementById('badges-earned-list').innerHTML = newBadges.map(b =>
            `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;background:white;border-radius:10px;padding:12px 16px;min-width:100px;text-align:center;border:1px solid #F9A825;">
               <span style="font-size:2rem">${b.emoji}</span>
               <span style="font-size:0.82rem;font-weight:800;color:${b.color}">${b.title}</span>
             </div>`
          ).join('');
        }
        newBadges.forEach(b => showToast(`🏅 Badge earned: ${b.emoji} ${b.title}!`, 'success'));
      }

      // Show goal suggestions banner if new goals exist
      if (typeof GoalEngine !== 'undefined' && currentDataObj) {
        const suggested = GoalEngine.getSuggestedGoalsList(grade);
        const banner = document.getElementById('goals-suggestion-banner');
        if (banner && suggested.length > 0) {
          banner.style.cssText += ';display:flex!important';
        }
      }

      // Footer
      document.getElementById('btn-sync-footer').addEventListener('click', () => {
        const ok = StorageManager.downloadLocalCSV();
        showToast(ok ? '✅ Data exported!' : '⚠️ No data yet.', ok ? 'success' : 'error');
      });
      document.getElementById('btn-refresh-footer').addEventListener('click', () => location.reload());
    })();
  </script>
</body>
</html>
