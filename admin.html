<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My School — Eco-Tracks Nepal</title>
  <script src="./js/storage_manager.js"></script>
  <script>
    if (!StorageManager.getAdminConfig()) { window.location.replace('setup.html'); }
  </script>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2D6A2F">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .school-profile-card {
      background: linear-gradient(135deg, var(--green-700), var(--green-800));
      border-radius: var(--radius-xl);
      padding: 28px 32px;
      color: #fff;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .school-profile-card h2 { font-size: 1.6rem; margin-bottom: 6px; }
    .school-profile-card p  { opacity: 0.85; font-size: 0.9rem; }

    .log-form-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 32px;
      box-shadow: var(--shadow-card);
      margin-bottom: 24px;
    }
    .log-form-panel h3 { margin-bottom: 20px; color: var(--text-primary); }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .metric-label {
      font-size: 0.82rem; font-weight: 700;
      color: var(--text-muted); display: block; margin-bottom: 6px;
    }

    .log-history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .log-history-table th {
      background: var(--bg-page);
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .log-history-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-body);
    }
    .log-history-table tr:last-child td { border-bottom: none; }
    .log-history-table .latest-row { background: #F1F8E9; font-weight: 700; }

    .locked-overlay {
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      text-align: center;
      margin-bottom: 24px;
    }
    .locked-overlay h3 { color: var(--text-primary); margin-bottom: 8px; }
    .locked-overlay p  { color: var(--text-muted); margin-bottom: 20px; }

    @media (max-width: 768px) {
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      .school-profile-card { flex-direction: column; }
    }
  </style>
  <script src="./js/geographic_matrix.js"></script>
  <script src="./js/emission_factors.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/nav.js"></script>
</head>
<body>
  <script>
    renderNav({ activePage: 'admin.html' });
  </script>

  <main class="page-main">
    <div class="container">
      <div id="admin-body"></div>
    </div>
  </main>

  <script src="./js/calculator_engine.js"></script>
  <script src="./js/i18n.js"></script>
  <script>
    renderFooter({ showOverviewLink: true });
    I18n.init();

    const engine = new CalculatorEngine();
    engine.init();

    const config  = StorageManager.getAdminConfig() || {};
    const geoData = window.GEOGRAPHIC_MATRIX?.districts || {};
    const distData = geoData[config.district] || { name: config.district || '—', region: '—' };
    const isAdmin  = StorageManager.isAdminSession();

    render();

    function render() {
      const isAdmin = StorageManager.isAdminSession();
      const logs    = StorageManager.getMonthlyLogs();
      const latest  = StorageManager.getLatestMonthlyLog();

      const schoolCard = `
        <div class="school-profile-card animate-fade-up">
          <div>
            <h2>🏫 ${config.schoolName || 'My School'}</h2>
            <p>📍 ${distData.name} · ${distData.region} Region · ${config.studentCount || '—'} students</p>
          </div>
          <div style="text-align:right;">
            <a href="setup.html" class="btn btn-outline btn-sm" style="border-color:rgba(255,255,255,0.5);color:#fff;background:rgba(255,255,255,0.1)">✏️ Re-run Setup</a>
          </div>
        </div>`;

      // Auth gate for edit form
      const editSection = isAdmin ? buildLogForm(latest) : `
        <div class="locked-overlay animate-fade-up delay-1">
          <div style="font-size:3rem;margin-bottom:12px;">🔒</div>
          <h3>Admin Login Required</h3>
          <p>Click the lock icon in the top navigation to log in and edit school data.</p>
          <button class="btn btn-primary" onclick="document.getElementById('nav-account-btn').click()">🔓 Login as Admin</button>
        </div>`;

      const historySection = logs.length > 0 ? buildLogHistory(logs) : '';
      const settingsSection = isAdmin ? buildSettings() : '';

      document.getElementById('admin-body').innerHTML = schoolCard + editSection + historySection + settingsSection;

      if (isAdmin) attachFormHandlers();

      // Footer sync
      document.getElementById('btn-sync-footer')?.addEventListener('click', async () => {
        const result = await StorageManager.syncWithServer();
        showToast(result.message, result.success ? 'success' : 'error');
      });
      document.getElementById('btn-reset-data')?.addEventListener('click', () => {
        if (confirm('Reset ALL app data? This cannot be undone.')) {
          localStorage.clear(); sessionStorage.clear(); location.href = 'setup.html';
        }
      });
    }

    function buildLogForm(latest) {
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const now    = new Date();
      const mopts  = months.map((m, i) => `<option value="${m}"${latest?.month === m || (!latest && now.getMonth() === i) ? ' selected' : ''}>${m}</option>`).join('');
      const yearNow = now.getFullYear();

      return `
        <div class="log-form-panel animate-fade-up delay-1">
          <h3>📊 Log Monthly Usage</h3>
          <p class="text-sm text-muted mb-20">Add a new monthly entry. The latest log is used in all calculations.</p>

          <div class="metrics-grid mb-20">
            <div>
              <label class="metric-label">📅 Month</label>
              <select class="form-select" id="log-month">${mopts}</select>
            </div>
            <div>
              <label class="metric-label">Year</label>
              <input class="form-input" type="number" id="log-year" value="${yearNow}" min="2020" max="2035">
            </div>
            <div>
              <label class="metric-label">👥 Student Count</label>
              <input class="form-input" type="number" id="log-students" placeholder="e.g. 450" min="1" value="${config.studentCount || ''}">
            </div>
          </div>

          <div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px;">
            <div style="font-weight:700;color:var(--text-primary);margin-bottom:14px;">Energy &amp; Utilities</div>
            <div class="metrics-grid">
              <div>
                <label class="metric-label">⚡ Electricity (kWh)</label>
                <input class="form-input" type="number" id="log-elec" placeholder="e.g. 120" min="0" step="0.1" value="${latest?.electricity || ''}">
              </div>
              <div>
                <label class="metric-label">💧 Water (Litres)</label>
                <input class="form-input" type="number" id="log-water" placeholder="e.g. 5000" min="0" value="${latest?.water || ''}">
              </div>
              <div>
                <label class="metric-label">⛽ Diesel/Petrol (L)</label>
                <input class="form-input" type="number" id="log-diesel" placeholder="e.g. 40" min="0" step="0.1" value="${latest?.diesel || ''}">
              </div>
              <div>
                <label class="metric-label">🔥 LPG Cylinders</label>
                <input class="form-input" type="number" id="log-lpg" placeholder="e.g. 2" min="0" step="1" value="${latest?.lpg || ''}">
              </div>
            </div>
          </div>

          <div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px;">
            <div style="font-weight:700;color:var(--text-primary);margin-bottom:14px;">Waste &amp; Practices</div>
            <div class="metrics-grid">
              <div>
                <label class="metric-label">🗑️ Primary Waste Disposal</label>
                <select class="form-select" id="log-waste-type">
                  <option value="burning" ${latest?.wasteType==='burning'?'selected':''}>Open-Air Burning</option>
                  <option value="municipal" ${latest?.wasteType==='municipal'?'selected':''}>Municipal Collection</option>
                  <option value="compost" ${latest?.wasteType==='compost'?'selected':''}>Composting &amp; Recycling</option>
                  <option value="pit" ${latest?.wasteType==='pit'?'selected':''}>Anaerobic Pit Burial</option>
                </select>
              </div>
              <div>
                <label class="metric-label">🍳 Canteen Cooking Method</label>
                <select class="form-select" id="log-lunch-method">
                  <option value="lpg" ${latest?.lunchMethod==='lpg'?'selected':''}>LPG Gas</option>
                  <option value="firewood" ${latest?.lunchMethod==='firewood'?'selected':''}>Firewood</option>
                  <option value="briquettes" ${latest?.lunchMethod==='briquettes'?'selected':''}>Briquettes</option>
                  <option value="electric" ${latest?.lunchMethod==='electric'?'selected':''}>Electric</option>
                </select>
              </div>
              <div>
                <label class="metric-label">♻️ Waste Segregation</label>
                <select class="form-select" id="log-segregated">
                  <option value="no" ${latest?.wasteSegregated==='no'?'selected':''}>No — single mixed bin</option>
                  <option value="yes" ${latest?.wasteSegregated==='yes'?'selected':''}>Yes — dry/wet separated</option>
                </select>
              </div>
              <div>
                <label class="metric-label">🚰 Leaking Taps (count)</label>
                <input class="form-input" type="number" id="log-leaking-taps" placeholder="0" min="0" value="${latest?.leakingTaps ?? 0}">
              </div>
              <div>
                <label class="metric-label">💧 Grey Water Reuse</label>
                <select class="form-select" id="log-grey-water">
                  <option value="no" ${latest?.greyWaterUse==='no'?'selected':''}>No</option>
                  <option value="yes" ${latest?.greyWaterUse==='yes'?'selected':''}>Yes — reuse for garden/flush</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Live CO₂ estimate -->
          <div id="co2-preview-box" style="display:none;background:var(--green-50);border:1px solid var(--green-300);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;">
            <span style="font-size:1.3rem;">🌿</span>
            <div>
              <div style="font-size:0.8rem;font-weight:700;color:var(--green-700);">Estimated School CO₂e this month</div>
              <div id="co2-preview-val" style="font-size:1.4rem;font-weight:900;color:var(--green-800);"></div>
            </div>
          </div>

          <button class="btn btn-primary btn-lg w-full" id="btn-log-save">💾 Save Monthly Log</button>
        </div>`;
    }

    function buildLogHistory(logs) {
      const recent = logs.slice().reverse().slice(0, 12);
      return `
        <div class="log-form-panel animate-fade-up delay-2">
          <h3>📋 Monthly Log History</h3>
          <div style="overflow-x:auto;">
            <table class="log-history-table">
              <thead>
                <tr>
                  <th>Month</th><th>Elec (kWh)</th><th>Water (L)</th><th>LPG (cyl)</th><th>Diesel (L)</th><th>Waste Type</th><th>Logged</th>
                </tr>
              </thead>
              <tbody>
                ${recent.map((log, i) => `
                  <tr class="${i === 0 ? 'latest-row' : ''}">
                    <td>${i === 0 ? '⭐ ' : ''}${log.month || '?'} ${log.year || ''}</td>
                    <td>${log.electricity ?? '—'}</td>
                    <td>${log.water ?? '—'}</td>
                    <td>${log.lpg ?? '—'}</td>
                    <td>${log.diesel ?? '—'}</td>
                    <td>${log.wasteType || '—'}</td>
                    <td style="color:var(--text-caption)">${log.savedAt ? new Date(log.savedAt).toLocaleDateString() : '—'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
          <p class="text-sm text-muted mt-12">⭐ = latest log used in all calculations</p>
        </div>`;
    }

    function buildSettings() {
      return `
        <div class="log-form-panel animate-fade-up delay-2">
          <h3>⚙️ Settings</h3>
          <div class="metrics-grid">
            <div>
              <label class="metric-label">🌐 Sync Server URL</label>
              <input class="form-input" type="url" id="input-sync-url" placeholder="https://yourschool.edu.np/ecotracks/sync_server.php" value="${config.syncServerUrl || ''}">
              <p class="text-sm text-muted mt-4">Set to enable cloud sync and schools heatmap.</p>
            </div>
          </div>
          <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;">
            <button class="btn btn-primary" id="btn-save-settings">Save Settings</button>
            <button class="btn btn-outline" id="btn-export-setup" style="border-color:var(--blue);color:var(--blue)">📤 Export Setup File</button>
          </div>
        </div>`;
    }

    function attachFormHandlers() {
      // Live CO₂ preview
      ['log-elec','log-lpg','log-water','log-diesel'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', updateCO2Preview);
      });
      updateCO2Preview();

      function updateCO2Preview() {
        const elec   = parseFloat(document.getElementById('log-elec')?.value) || 0;
        const lpg    = parseFloat(document.getElementById('log-lpg')?.value)  || 0;
        const waterL = parseFloat(document.getElementById('log-water')?.value) || 0;
        const diesel = parseFloat(document.getElementById('log-diesel')?.value) || 0;
        const co2Elec   = engine.calculateModule('energy',  'electricity_kwh',        elec);
        const co2LPG    = engine.calculateModule('energy',  'lpg_cylinder',           lpg);
        const co2Water  = engine.calculateModule('water',   'municipal_piped_m3',     waterL / 1000);
        const co2Diesel = engine.calculateModule('commute', 'diesel_vehicle_litre',   diesel);
        const total = co2Elec + co2LPG + co2Water + co2Diesel;
        const box = document.getElementById('co2-preview-box');
        if (total > 0 && box) {
          box.style.display = 'flex';
          document.getElementById('co2-preview-val').textContent = `${total.toFixed(2)} kg CO₂e / month`;
        }
      }

      // Save monthly log
      document.getElementById('btn-log-save')?.addEventListener('click', () => {
        const logData = {
          month:        document.getElementById('log-month').value,
          year:         parseInt(document.getElementById('log-year').value),
          studentCount: parseInt(document.getElementById('log-students').value) || config.studentCount || 30,
          electricity:  parseFloat(document.getElementById('log-elec').value)   || 0,
          water:        parseFloat(document.getElementById('log-water').value)   || 0,
          diesel:       parseFloat(document.getElementById('log-diesel').value)  || 0,
          lpg:          parseFloat(document.getElementById('log-lpg').value)     || 0,
          wasteType:    document.getElementById('log-waste-type').value,
          wasteSegregated: document.getElementById('log-segregated').value,
          lunchMethod:  document.getElementById('log-lunch-method').value,
          leakingTaps:  parseInt(document.getElementById('log-leaking-taps').value) || 0,
          greyWaterUse: document.getElementById('log-grey-water').value,
        };

        // Update admin config with latest student count
        const updatedConfig = { ...config, studentCount: logData.studentCount };
        StorageManager.saveAdminConfig(updatedConfig);

        StorageManager.addMonthlyLog(logData);
        showToast(`✅ ${logData.month} ${logData.year} logged!`, 'success');
        render(); // Re-render to show updated history
      });

      // Save settings
      document.getElementById('btn-save-settings')?.addEventListener('click', () => {
        const syncUrl = document.getElementById('input-sync-url')?.value.trim() || null;
        StorageManager.saveAdminConfig({ ...config, syncServerUrl: syncUrl });
        showToast('✅ Settings saved!', 'success');
      });

      // Export setup
      document.getElementById('btn-export-setup')?.addEventListener('click', () => {
        StorageManager.exportSetupPackage();
        showToast('📤 Setup file downloaded.', 'success');
      });
    }
  </script>
</body>
</html>
